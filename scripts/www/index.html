<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>qPCR 体系助手 Pro (Mobile Slim)</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f1f5f9;
            --card: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
            --success: #10b981;
            --danger: #ef4444;
            --secondary: #64748b;
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 页眉署名 - 居中对齐 */
        header {
            width: 100%;
            max-width: 450px;
            padding: 15px 5px;
            text-align: center;
        }

        .developer-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--secondary);
        }

        .main-container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card {
            background: var(--card);
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            padding: 12px;
            border: 1px solid var(--border);
        }

        h3 { margin: 0 0 12px 0; font-size: 1.1rem; color: #0f172a; display: flex; align-items: center; gap: 6px; }

        /* 配置栏布局 */
        .config-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 12px;
            background: #f8fafc;
            padding: 10px;
            border-radius: 6px;
        }

        .input-group { display: flex; flex-direction: column; }
        label { font-size: 0.7rem; font-weight: 700; margin-bottom: 3px; color: var(--secondary); }
        input {
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 5px;
            font-size: 0.9rem;
            outline: none;
            width: 100%;
        }
        input:focus { border-color: var(--primary); background: #fff; }
        input[readonly] { background: #e2e8f0; color: var(--secondary); }

        /* 表格容器 */
        .table-wrapper {
            width: 100%;
            overflow-x: hidden;
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            table-layout: fixed;
        }

        th { 
            text-align: left; 
            padding: 8px 4px; 
            background: #f8fafc; 
            font-size: 0.75rem; 
            color: var(--secondary); 
            border-bottom: 2px solid var(--border); 
        }
        td { 
            padding: 8px 4px;
            border-bottom: 1px solid var(--border); 
            vertical-align: middle;
            font-size: 0.85rem;
        }

        .col-name { width: 38%; }
        .col-vol { width: 26%; text-align: right; }
        .col-total { width: 26%; text-align: right; }
        .col-btn { width: 10%; text-align: center; }

        .comp-input { 
            width: 100%; 
            border: none; 
            background: transparent; 
            font-size: 0.85rem;
            padding: 2px 0;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .num-input { 
            width: 100%; 
            text-align: right; 
            font-weight: 700; 
            color: var(--primary); 
            border: none;
            background: transparent;
            font-size: 0.9rem;
        }

        .total-val { text-align: right; font-weight: 700; color: #334155; font-size: 0.9rem; }

        .water-row { background-color: #fffdec; }
        .template-row { background-color: #f9fafb; }
        .total-row { background-color: #f1f5f9; font-weight: 700; }

        .lib-slot {
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 8px;
            background: #fff;
        }
        .slot-name { 
            width: 100%; border: none; font-weight: 700; font-size: 0.95rem; color: var(--text);
            border-bottom: 1px solid transparent; padding: 2px 0; margin-bottom: 8px;
        }
        .btn-group { display: flex; gap: 6px; }

        .btn {
            border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer;
            font-weight: 700; font-size: 0.85rem; transition: 0.1s;
        }
        .btn-add { background: var(--success); color: white; margin-bottom: 12px; width: 100%; }
        .btn-save { background: var(--primary); color: white; flex: 1; }
        .btn-load { background: white; border: 1px solid var(--border); color: var(--text); flex: 1; }
        .btn-del { color: var(--danger); background: transparent; font-size: 1.2rem; padding: 0; line-height: 1; }

        .footer {
            width: 100%;
            max-width: 450px;
            text-align: center;
            font-size: 10px;
            color: #94a3b8;
            margin: 15px 0;
            line-height: 1.4;
        }

        .warn-text { color: var(--danger); font-size: 0.75rem; margin-top: 8px; display: none; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="developer-name">开发者：沙兴良</div>
</header>

<div class="main-container">
    <div class="card">
        <h3>🔬 qPCR 体系计算</h3>
        
        <div class="config-grid">
            <div class="input-group">
                <label>总体系(μL)</label>
                <input type="number" id="targetTotal" value="20" step="0.5" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>样品数(N)</label>
                <input type="number" id="sampleN" value="10" min="1" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>损耗(μL)</label>
                <input type="number" id="lossVol" value="0" step="0.01" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>配制系数</label>
                <input type="text" id="factorDisplay" readonly>
            </div>
        </div>

        <button class="btn btn-add" onclick="addRow()">+ 插入新组分</button>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th class="col-name">组分</th>
                        <th class="col-vol">单管</th>
                        <th class="col-total">总量</th>
                        <th class="col-btn"></th>
                    </tr>
                </thead>
                <tbody id="componentBody"></tbody>
                <tbody>
                    <tr class="water-row">
                        <td>ddH₂O</td>
                        <td style="text-align: right; padding-right: 10px;" id="waterSingle">0</td>
                        <td class="total-val" id="waterTotal">0</td>
                        <td></td>
                    </tr>
                    <tr class="template-row">
                        <td><input type="text" class="comp-input" id="templateName" value="Template DNA"></td>
                        <td style="text-align: right">
                            <input type="number" class="num-input" id="templateVol" value="1" step="0.1" oninput="calculate()">
                        </td>
                        <td class="total-val" id="templateTotalDisplay">0</td>
                        <td></td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr class="total-row">
                        <td>总计</td>
                        <td style="text-align: right; padding-right: 10px;" id="finalSingle">20</td>
                        <td class="total-val" style="color: var(--primary)" id="finalTotal">0</td>
                        <td></td>
                    </tr>
                </tfoot>
            </table>
        </div>
        <div id="warn" class="warn-text">⚠️ 警告：组分总和已超体系！</div>
    </div>

    <div class="card">
        <h3>📁 配方储存库</h3>
        <div class="library-grid">
            <div class="lib-slot" id="slot-0">
                <input class="slot-name" id="slotName-0" value="常用配方 1">
                <div class="btn-group">
                    <button class="btn btn-load" onclick="loadData(0)">读取</button>
                    <button class="btn btn-save" onclick="saveData(0)">保存</button>
                </div>
            </div>
            <div class="lib-slot" id="slot-1">
                <input class="slot-name" id="slotName-1" value="常用配方 2">
                <div class="btn-group">
                    <button class="btn btn-load" onclick="loadData(1)">读取</button>
                    <button class="btn btn-save" onclick="saveData(1)">保存</button>
                </div>
            </div>
            <div class="lib-slot" id="slot-2">
                <input class="slot-name" id="slotName-2" value="常用配方 3">
                <div class="btn-group">
                    <button class="btn btn-load" onclick="loadData(2)">读取</button>
                    <button class="btn btn-save" onclick="saveData(2)">保存</button>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        结果仅供参考，实际实验请结合专业判断。<br>
        © 开发者：沙兴良
    </div>
</div>

<script>
    function smartFormat(num) {
        const val = Math.round(num * 100) / 100;
        return Number.isInteger(val) ? val.toString() : val.toFixed(2);
    }

    // 更新初始组分逻辑：合并引物，移除探针
    const initialComponents = [
        { name: "2× Master Mix", vol: 10 },
        { name: "Primer F/R", vol: 0.8 }
    ];

    window.onload = () => {
        const savedPresets = JSON.parse(localStorage.getItem('qpcr_slim_presets_v2') || "[]");
        savedPresets.forEach((p, i) => {
            if (p && p.title) document.getElementById(`slotName-${i}`).value = p.title;
        });
        
        const tbody = document.getElementById('componentBody');
        initialComponents.forEach(c => addRow(c.name, c.vol));
        calculate();
    };

    function addRow(name = "", vol = 0) {
        const tbody = document.getElementById('componentBody');
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="text" class="comp-input" value="${name}"></td>
            <td style="text-align: right">
                <input type="number" class="num-input row-vol" value="${vol}" step="0.1" oninput="calculate()">
            </td>
            <td class="total-val row-total">0</td>
            <td style="text-align: center"><button class="btn btn-del" onclick="this.parentElement.parentElement.remove();calculate()">×</button></td>
        `;
        tbody.appendChild(tr);
        calculate();
    }

    function calculate() {
        const targetTotal = parseFloat(document.getElementById('targetTotal').value) || 0;
        const N = parseFloat(document.getElementById('sampleN').value) || 0;
        const loss = parseFloat(document.getElementById('lossVol').value) || 0;
        
        const multiplier = N * (1 + loss / targetTotal);
        document.getElementById('factorDisplay').value = multiplier.toFixed(2);

        let usedVol = 0;

        document.querySelectorAll('#componentBody tr').forEach(row => {
            const v = parseFloat(row.querySelector('.row-vol').value) || 0;
            usedVol += v;
            row.querySelector('.row-total').innerText = smartFormat(v * multiplier);
        });

        const tVol = parseFloat(document.getElementById('templateVol').value) || 0;
        usedVol += tVol;
        document.getElementById('templateTotalDisplay').innerText = smartFormat(tVol * multiplier);

        const waterSingle = targetTotal - usedVol;
        const waterTotal = waterSingle * multiplier;
        const warn = document.getElementById('warn');

        if (waterSingle < 0) {
            document.getElementById('waterSingle').innerText = "超量!";
            document.getElementById('waterTotal').innerText = "超量!";
            warn.style.display = 'block';
        } else {
            document.getElementById('waterSingle').innerText = smartFormat(waterSingle);
            document.getElementById('waterTotal').innerText = smartFormat(waterTotal);
            warn.style.display = 'none';
        }

        document.getElementById('finalSingle').innerText = smartFormat(targetTotal);
        document.getElementById('finalTotal').innerText = smartFormat(targetTotal * multiplier);
    }

    function saveData(index) {
        const presets = JSON.parse(localStorage.getItem('qpcr_slim_presets_v2') || "[null, null, null]");
        const data = {
            title: document.getElementById(`slotName-${index}`).value,
            targetTotal: document.getElementById('targetTotal').value,
            lossVol: document.getElementById('lossVol').value,
            templateName: document.getElementById('templateName').value,
            templateVol: document.getElementById('templateVol').value,
            components: []
        };
        document.querySelectorAll('#componentBody tr').forEach(row => {
            data.components.push({
                name: row.querySelector('.comp-input').value,
                vol: row.querySelector('.row-vol').value
            });
        });
        presets[index] = data;
        localStorage.setItem('qpcr_slim_presets_v2', JSON.stringify(presets));
        
        const slot = document.getElementById(`slot-${index}`);
        slot.style.backgroundColor = "#f0fdf4";
        setTimeout(() => slot.style.backgroundColor = "white", 500);
        alert("已保存配方：" + data.title);
    }

    function loadData(index) {
        const presets = JSON.parse(localStorage.getItem('qpcr_slim_presets_v2'));
        if (!presets || !presets[index]) return alert("此槽位为空");

        const data = presets[index];
        document.getElementById('targetTotal').value = data.targetTotal;
        document.getElementById('lossVol').value = data.lossVol;
        document.getElementById('templateName').value = data.templateName;
        document.getElementById('templateVol').value = data.templateVol;
        
        const tbody = document.getElementById('componentBody');
        tbody.innerHTML = '';
        data.components.forEach(c => addRow(c.name, c.vol));
        calculate();
    }
</script>

</body>
</html>
